# database.yml — keep it simple
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: plume_development

test:
  <<: *default
  database: plume_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
