# Model routing config.
#
# Each provider lists credentials (resolved at runtime via env vars) and the
# concrete models it exposes with cost/capability metadata. The `tasks:` block
# assigns a preferred + fallback model per task. The router prefers the first
# entry but falls back down the list when the group's daily cap is exhausted
# or when the provider is unavailable.
#
# Changing a model is just a YAML edit — no code changes.

providers:
  stub:
    kind: stub              # local, no network; used in dev + tests
  openai:
    kind: openai
    api_key_env: OPENAI_API_KEY
  anthropic:
    kind: anthropic
    api_key_env: ANTHROPIC_API_KEY
  vllm:
    kind: openai-like       # vLLM exposes an OpenAI-compatible API
    base_url_env: VLLM_URL
    api_key_env: VLLM_API_KEY   # often "EMPTY" for local vLLM

# cost_per_1k is USD per 1K tokens [prompt, completion]
# Non-reasoning models are listed first in task chains to encourage
# predictable MCP tool calls and keep cost low. Reasoning-heavy models
# (gpt-5, opus) are reserved for planning where their extra budget pays off.
models:
  stub-chat:         { provider: stub,      cost_per_1k: [0.0, 0.0], max_tokens: 4096 }
  gpt-4o-mini:       { provider: openai,    cost_per_1k: [0.00015, 0.0006], max_tokens: 128000 }
  gpt-4o:            { provider: openai,    cost_per_1k: [0.0025, 0.01],    max_tokens: 128000 }
  gpt-5-mini:        { provider: openai,    cost_per_1k: [0.00025, 0.002],  max_tokens: 128000 }
  gpt-5:             { provider: openai,    cost_per_1k: [0.00125, 0.01],   max_tokens: 200000 }
  claude-opus-4-6:   { provider: anthropic, cost_per_1k: [0.015, 0.075],    max_tokens: 200000 }
  claude-haiku-4-5:  { provider: anthropic, cost_per_1k: [0.001, 0.005],    max_tokens: 200000 }
  llama-3.3-70b:     { provider: vllm,      cost_per_1k: [0.0, 0.0],        max_tokens: 8192, model_id: "meta-llama/Llama-3.3-70B-Instruct" }

# Per-task model preference. First entry is preferred; rest are fallbacks
# (in order) when the preferred is capped, rate-limited, or unavailable.
# Each agent has its own task key so we can tune chain + token cap per role.
tasks:
  intent_classification: [gpt-4o-mini, claude-haiku-4-5, stub-chat]
  companion:             [gpt-4o-mini, claude-haiku-4-5, stub-chat]
  discovery:             [gpt-4o-mini, claude-haiku-4-5, stub-chat]
  concierge:             [gpt-4o-mini, claude-haiku-4-5, stub-chat]
  planning:              [gpt-4o,      claude-opus-4-6,  claude-haiku-4-5, stub-chat]
  chat:                  [gpt-4o-mini, claude-haiku-4-5, stub-chat]  # legacy alias
  summarization:         [gpt-4o-mini, claude-haiku-4-5, stub-chat]
  media_ocr:             [stub-chat]                   # no vision yet; stubbed
  media_asr:             [stub-chat]                   # no ASR yet; stubbed

# Per-task output token caps. Agents should stay brief; the persona also
# enforces 2-4 phrases, but the token ceiling is the hard limit.
task_limits:
  intent_classification: 16
  companion:             500
  discovery:             500
  concierge:             500
  planning:              1200
  chat:                  500
  summarization:         400

# Daily USD cap per group (or per session when no group). Hitting the cap
# downgrades the router to the last entry of each task list, but does not
# fail the request.
budget:
  daily_cap_usd: 5.00
  fallback_task_key: stub-chat
